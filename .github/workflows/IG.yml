name: Instagram Reels Keyword Scraper

on:
  workflow_dispatch: # Memungkinkan eksekusi manual melalui tombol di GitHub UI

jobs:
  run_scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Configure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx

    - name: Execute Search Engine Scraper
      run: |
        python scrape_instagram.py

    - name: Export Scraped Output Data
      uses: actions/upload-artifact@v4
      with:
        name: ig-keyword-reels-data
        path: instagram_results.json
        retention-days: 5
